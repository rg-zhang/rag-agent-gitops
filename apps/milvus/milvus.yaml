# --- 仿照 Ollama 格式配置 Milvus ---
apiVersion: v1
kind: Namespace
metadata:
  name: ai-services
---
# etcd 存储
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: milvus-etcd-pvc
  namespace: ai-services
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: openebs-hostpath
  resources:
    requests:
      storage: 10Gi
---
# minio 存储
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: milvus-minio-pvc
  namespace: ai-services
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: openebs-hostpath
  resources:
    requests:
      storage: 20Gi
---
# milvus 数据存储
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: milvus-standalone-pvc
  namespace: ai-services
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: openebs-hostpath
  resources:
    requests:
      storage: 50Gi
---
# Milvus Standalone 部署
apiVersion: apps/v1
kind: Deployment
metadata:
  name: milvus
  namespace: ai-services
spec:
  replicas: 1
  selector:
    matchLabels:
      app: milvus
  template:
    metadata:
      labels:
        app: milvus
    spec:
      containers:
      - name: milvus
        image: milvusdb/milvus:v2.4.7
        command: ["milvus", "standalone", "console"]
        ports:
        - containerPort: 19530
        - containerPort: 9091
        volumeMounts:
        - name: milvus-etcd
          mountPath: /var/lib/etcd
        - name: milvus-minio
          mountPath: /var/lib/minio
        - name: milvus-data
          mountPath: /var/lib/milvus
        env:
        - name: ETCD_USE_EMBED
          value: "true"
        - name: MINIO_USE_EMBED
          value: "true"
        # 增加健康检查，防止启动失败
        startupProbe:
          tcpSocket:
            port: 19530
          failureThreshold: 30
          periodSeconds: 10
      volumes:
      - name: milvus-etcd
        persistentVolumeClaim:
          claimName: milvus-etcd-pvc
      - name: milvus-minio
        persistentVolumeClaim:
          claimName: milvus-minio-pvc
      - name: milvus-data
        persistentVolumeClaim:
          claimName: milvus-standalone-pvc
---
# Milvus 服务
apiVersion: v1
kind: Service
metadata:
  name: milvus-service
  namespace: ai-services
spec:
  type: NodePort
  selector:
    app: milvus
  ports:
  - name: milvus-grpc
    port: 19530
    targetPort: 19530
  - name: milvus-metric
    port: 9091
    targetPort: 9091
