# -------------------- etcd --------------------
apiVersion: v1
kind: Service
metadata:
  name: milvus-etcd
  namespace: ai-services
spec:
  ports:
  - port: 2379
  selector:
    app: milvus-etcd
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: milvus-etcd
  namespace: ai-services
spec:
  replicas: 1
  selector:
    matchLabels:
      app: milvus-etcd
  template:
    metadata:
      labels:
        app: milvus-etcd
    spec:
      securityContext:
        runAsUser: 1001
        fsGroup: 1001
      containers:
      - name: etcd
        image: quay.io/coreos/etcd:v3.5.9
        command: ["etcd"]
        args:
        - --data-dir=/etcd-data
        - --listen-client-urls=http://0.0.0.0:2379
        - --advertise-client-urls=http://milvus-etcd:2379
        volumeMounts:
        - name: etcd-data
          mountPath: /etcd-data
      volumes:
      - name: etcd-data
        persistentVolumeClaim:
          claimName: milvus-etcd-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: milvus-etcd-pvc
  namespace: ai-services
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: openebs-hostpath
  resources:
    requests:
      storage: 10Gi

# -------------------- minio --------------------
---
apiVersion: v1
kind: Service
metadata:
  name: milvus-minio
  namespace: ai-services
spec:
  ports:
  - port: 9000
  selector:
    app: milvus-minio
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: milvus-minio
  namespace: ai-services
spec:
  replicas: 1
  selector:
    matchLabels:
      app: milvus-minio
  template:
    metadata:
      labels:
        app: milvus-minio
    spec:
      securityContext:
        runAsUser: 1001
        fsGroup: 1001
      containers:
      - name: minio
        image: minio/minio:latest
        command: ["minio", "server", "/data"]
        env:
        - name: MINIO_ROOT_USER
          value: "minioadmin"
        - name: MINIO_ROOT_PASSWORD
          value: "minioadmin"
        volumeMounts:
        - name: minio-data
          mountPath: /data
      volumes:
      - name: minio-data
        persistentVolumeClaim:
          claimName: milvus-minio-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: milvus-minio-pvc
  namespace: ai-services
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: openebs-hostpath
  resources:
    requests:
      storage: 20Gi

# -------------------- milvus standalone --------------------
---
apiVersion: v1
kind: Service
metadata:
  name: milvus-standalone
  namespace: ai-services
spec:
  type: NodePort
  ports:
  - port: 19530
    nodePort: 30530
  selector:
    app: milvus-standalone
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: milvus-standalone
  namespace: ai-services
spec:
  replicas: 1
  selector:
    matchLabels:
      app: milvus-standalone
  template:
    metadata:
      labels:
        app: milvus-standalone
    spec:
      # 等待 etcd 和 minio 启动（关键！）
      initContainers:
      - name: wait-etcd
        image: busybox:1.36
        command: ["sh", "-c", "until nc -z milvus-etcd 2379; do sleep 1; done"]
      - name: wait-minio
        image: busybox:1.36
        command: ["sh", "-c", "until nc -z milvus-minio 9000; do sleep 1; done"]

      securityContext:
        runAsUser: 1001
        fsGroup: 1001

      containers:
      - name: milvus
        image: milvusdb/milvus:v2.3.10
        # 老版本必须用 run！
        command: ["milvus", "run", "standalone"]
        env:
        - name: ETCD_ENDPOINTS
          value: "milvus-etcd:2379"
        - name: MINIO_ENDPOINT
          value: "milvus-minio:9000"
        - name: MINIO_ACCESS_KEY
          value: "minioadmin"
        - name: MINIO_SECRET_KEY
          value: "minioadmin"
        volumeMounts:
        - name: milvus-data
          mountPath: /var/lib/milvus
      volumes:
      - name: milvus-data
        persistentVolumeClaim:
          claimName: milvus-standalone-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: milvus-standalone-pvc
  namespace: ai-services
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: openebs-hostpath
  resources:
    requests:
      storage: 50Gi
