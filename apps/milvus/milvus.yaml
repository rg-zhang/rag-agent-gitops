apiVersion: v1
kind: Namespace
metadata:
  name: ai-services
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: milvus-etcd-pvc
  namespace: ai-services
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: openebs-hostpath
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: milvus-minio-pvc
  namespace: ai-services
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: openebs-hostpath
  resources:
    requests:
      storage: 20Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: milvus-standalone-pvc
  namespace: ai-services
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: openebs-hostpath
  resources:
    requests:
      storage: 50Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: milvus-etcd
  namespace: ai-services
spec:
  replicas: 1
  selector:
    matchLabels:
      app: milvus-etcd
  template:
    metadata:
      labels:
        app: milvus-etcd
    spec:
      containers:
      - name: etcd
        image: quay.io/coreos/etcd:v3.5.5
        args:
        - --listen-client-urls=http://0.0.0.0:2379
        - --advertise-client-urls=http://0.0.0.0:2379
        - --data-dir=/etcd-data
        ports:
        - containerPort: 2379
        volumeMounts:
        - name: data
          mountPath: /etcd-data
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: milvus-etcd-pvc
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: milvus-minio
  namespace: ai-services
spec:
  replicas: 1
  selector:
    matchLabels:
      app: milvus-minio
  template:
    metadata:
      labels:
        app: milvus-minio
    spec:
      containers:
      - name: minio
        image: minio/minio:latest
        args: ["server", "/data"]
        env:
        - name: MINIO_ROOT_USER
          value: "minioadmin"
        - name: MINIO_ROOT_PASSWORD
          value: "minioadmin"
        ports:
        - containerPort: 9000
        volumeMounts:
        - name: data
          mountPath: /data
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: milvus-minio-pvc
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: milvus-standalone
  namespace: ai-services
spec:
  replicas: 1
  selector:
    matchLabels:
      app: milvus-standalone
  template:
    metadata:
      labels:
        app: milvus-standalone
    spec:
      containers:
      - name: milvus
        image: milvusdb/milvus:v2.4.3
        command: ["milvus", "run", "standalone"]
        env:
        - name: ETCD_ENDPOINTS
          value: "milvus-etcd:2379"
        - name: MINIO_ENDPOINT
          value: "milvus-minio:9000"
        - name: MINIO_ACCESS_KEY
          value: "minioadmin"
        - name: MINIO_SECRET_KEY
          value: "minioadmin"
        ports:
        - containerPort: 19530
        - containerPort: 9091
        volumeMounts:
        - name: data
          mountPath: /var/lib/milvus
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: milvus-standalone-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: milvus-etcd
  namespace: ai-services
spec:
  type: ClusterIP
  selector:
    app: milvus-etcd
  ports:
  - port: 2379
    targetPort: 2379
---
apiVersion: v1
kind: Service
metadata:
  name: milvus-minio
  namespace: ai-services
spec:
  type: ClusterIP
  selector:
    app: milvus-minio
  ports:
  - port: 9000
    targetPort: 9000
---
apiVersion: v1
kind: Service
metadata:
  name: milvus-service
  namespace: ai-services
spec:
  type: NodePort
  selector:
    app: milvus-standalone
  ports:
  - name: grpc
    port: 19530
    targetPort: 19530
  - name: http
    port: 9091
    targetPort: 9091
