# --- Milvus 动态存储 YAML ｜ 完全沿用Ollama格式 ---
apiVersion: v1
kind: Namespace
metadata:
  name: ai-services
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: milvus-etcd-pvc
  namespace: ai-services
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: openebs-hostpath
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: milvus-minio-pvc
  namespace: ai-services
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: openebs-hostpath
  resources:
    requests:
      storage: 20Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: milvus-standalone-pvc
  namespace: ai-services
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: openebs-hostpath
  resources:
    requests:
      storage: 50Gi
---
# Milvus Standalone
apiVersion: apps/v1
kind: Deployment
metadata:
  name: milvus-standalone
  namespace: ai-services
spec:
  replicas: 1
  selector:
    matchLabels: { app: milvus-standalone }
  template:
    metadata:
      labels: { app: milvus-standalone }
    spec:
      containers:
      - name: milvus
        image: milvusdb/milvus:latest
        ports:
        - containerPort: 19530
        - containerPort: 9091
        volumeMounts:
        - name: etcd-data
          mountPath: /var/lib/milvus/etcd
        - name: minio-data
          mountPath: /var/lib/milvus/minio
        - name: milvus-data
          mountPath: /var/lib/milvus
      volumes:
      - name: etcd-data
        persistentVolumeClaim:
          claimName: milvus-etcd-pvc
      - name: minio-data
        persistentVolumeClaim:
          claimName: milvus-minio-pvc
      - name: milvus-data
        persistentVolumeClaim:
          claimName: milvus-standalone-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: milvus-service
  namespace: ai-services
spec:
  type: NodePort
  selector: { app: milvus-standalone }
  ports:
  - port: 19530
    targetPort: 19530
  - port: 9091
    targetPort: 9091
